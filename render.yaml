services:
  - type: web
    name: hardware-sculpture
    runtime: node
    plan: free
    nodeVersion: 20
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: FIRECRAWL_API_KEY
        value: fc-46ccce0a60d74d499236c8019d155312
    autoDeploy: true
